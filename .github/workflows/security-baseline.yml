name: security-baseline

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          cache-local-path: ~/.cache/uv
          enable-cache: true

      - name: Export locked requirements
        run: uv export --directory "$GITHUB_WORKSPACE" --frozen --format requirements-txt --no-hashes > requirements-ci.txt

      - name: Explain temporary audit ignore
        env:
          PIP_AUDIT_IGNORE: CVE-2026-4539
          PIP_AUDIT_IGNORE_UNTIL: 2026-06-30
        run: |
          if [ -n "${PIP_AUDIT_IGNORE:-}" ] && [ -n "${PIP_AUDIT_IGNORE_UNTIL:-}" ]; then
            today_epoch="$(date -u +%s)"
            until_epoch="$(date -u -j -f %F "${PIP_AUDIT_IGNORE_UNTIL}" +%s 2>/dev/null || date -u -d "${PIP_AUDIT_IGNORE_UNTIL}" +%s)"
            if [ "$today_epoch" -gt "$until_epoch" ]; then
              printf '%s\n' "pip-audit ignore ${PIP_AUDIT_IGNORE} expired on ${PIP_AUDIT_IGNORE_UNTIL}; remove ignore or extend with justification." >&2
              exit 1
            fi
          fi

          printf '%s\n' "Ignoring CVE-2026-4539 temporarily due upstream triage; remove once fixed upstream and lockfile updated."

      - name: Audit dependencies
        env:
          PIP_AUDIT_IGNORE: CVE-2026-4539
          PIP_AUDIT_IGNORE_UNTIL: 2026-06-30
        run: |
          if [ -n "${PIP_AUDIT_IGNORE:-}" ]; then
            uvx --from pip-audit pip-audit -r requirements-ci.txt --ignore-vuln "$PIP_AUDIT_IGNORE"
          else
            uvx --from pip-audit pip-audit -r requirements-ci.txt
          fi
