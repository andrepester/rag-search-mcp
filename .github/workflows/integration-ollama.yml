name: integration-ollama

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "53 2 * * 6"

permissions:
  contents: read

jobs:
  ollama-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      OLLAMA_HOST: http://host.docker.internal:11434
      EMBED_MODEL: nomic-embed-text
      INDEX_LIMIT: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Start shared Ollama host
        run: |
          docker_gateway="$(docker network inspect bridge --format '{{(index .IPAM.Config 0).Gateway}}')"
          if [ -z "$docker_gateway" ]; then
            echo "could not determine Docker bridge gateway" >&2
            exit 1
          fi
          docker run -d --name shared-ollama -p "${docker_gateway}:11434:11434" ollama/ollama:0.5.7
          for i in $(seq 1 60); do
            if docker exec shared-ollama ollama list >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "shared Ollama host not ready" >&2
          docker logs shared-ollama >&2 || true
          exit 1

      - name: Pull embedding model on shared Ollama host
        run: docker exec shared-ollama ollama pull "$EMBED_MODEL"

      - name: Install local runtime stack
        run: make install

      - name: Wait for MCP health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8765/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "MCP health endpoint not ready" >&2
          docker compose --project-directory . -f docker/docker-compose.yml logs rag-mcp >&2 || true
          exit 1

      - name: Smoke check MCP endpoint
        run: curl -fsS http://127.0.0.1:8765/healthz

      - name: Print service logs
        if: always()
        run: docker compose --project-directory . -f docker/docker-compose.yml logs --no-color

      - name: Shutdown stack
        if: always()
        run: docker compose --project-directory . -f docker/docker-compose.yml down -v

      - name: Stop shared Ollama host
        if: always()
        run: docker rm -f shared-ollama
