name: integration-ollama

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "53 2 * * 6"

permissions:
  contents: read

jobs:
  ollama-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install local runtime stack
        run: make install

      - name: Wait for MCP health endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8765/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "MCP health endpoint not ready" >&2
          docker compose --project-directory . -f docker/docker-compose.yml logs rag-mcp >&2 || true
          exit 1

      - name: Reindex mounted sources
        run: make reindex

      - name: Smoke check MCP endpoint
        run: curl -fsS http://127.0.0.1:8765/healthz

      - name: Print service logs
        if: always()
        run: docker compose --project-directory . -f docker/docker-compose.yml logs --no-color

      - name: Shutdown stack
        if: always()
        run: docker compose --project-directory . -f docker/docker-compose.yml down -v
