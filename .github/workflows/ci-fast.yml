name: ci-fast

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.25.x"

      - name: Verify formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted:" >&2
            gofmt -l . >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        env:
          COVERAGE_MIN: "60"
        run: make test-cover COVERAGE_MIN=${COVERAGE_MIN}

      - name: Build
        run: |
          go build ./cmd/rag-mcp
          go build ./cmd/rag-index
          go build ./cmd/rag-install

      - name: Bootstrap config smoke test
        run: |
          rm -f .env opencode.json opencode.json.invalid
          go run ./cmd/rag-install --repo-root .
          test -f .env
          test -f opencode.json

      - name: Run tests in Docker build stage
        run: docker build -f docker/Dockerfile --target test -t local-rag-test .

      - name: Validate Docker Compose
        run: docker compose --project-directory . -f docker/docker-compose.yml config
