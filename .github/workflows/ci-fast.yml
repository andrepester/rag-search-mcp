name: ci-fast

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.x"

      - name: Verify formatting
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Test with coverage
        env:
          COVERAGE_MIN: "60"
        run: make test-cover COVERAGE_MIN=${COVERAGE_MIN}

      - name: Build
        run: make build

      - name: Bootstrap config smoke test
        run: make bootstrap-smoke

      - name: Run tests in Docker build stage
        run: docker build -f docker/Dockerfile --target test -t rag-search-mcp-test .

      - name: Validate Docker Compose
        run: docker compose --project-directory . -f docker/docker-compose.yml config
