name: ci-fast

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  host-portability:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify host portability guardrails
        run: sh ./shell/ci-host-portability.sh

  container-only-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify Go commands use the container runner
        run: sh ./shell/ci-container-only-go.sh

  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify formatting
        run: sh ./shell/ci-fmt-check.sh

  mod-tidy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify module files are tidy
        run: sh ./shell/ci-mod-tidy-check.sh

  go-runner-overrides-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Verify GO_IMAGE/GO_BIN overrides for Go helper scripts
        run: sh ./shell/go-runner-overrides-smoke.sh

  vet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Vet
        run: sh ./shell/ci-vet.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Test with coverage
        env:
          COVERAGE_MIN: "60"
        run: sh ./shell/ci-test-cover.sh

  golden-queries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Deterministic golden query regression test
        run: sh ./shell/ci-golden-queries.sh

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Build
        run: sh ./shell/ci-build.sh

  docker-test-stage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Run tests in Docker build stage
        run: docker build -f docker/Dockerfile --target test -t rag-search-mcp-test .

  bootstrap-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Bootstrap config smoke test
        run: sh ./shell/bootstrap-smoke.sh

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Validate Docker Compose
        env:
          # Required for Compose interpolation only; this job does not contact Ollama.
          OLLAMA_HOST: http://host.docker.internal:11434
        run: docker compose --project-directory . -f docker/docker-compose.yml config
