name: ci-fast

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted:" >&2
            gofmt -l . >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 ./...

      - name: Build
        run: |
          go build ./cmd/rag-mcp
          go build ./cmd/rag-index

      - name: Validate Docker Compose
        run: docker compose config
