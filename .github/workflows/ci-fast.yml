name: ci-fast

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.x"

      - name: Verify formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted:" >&2
            gofmt -l . >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        env:
          COVERAGE_MIN: "60"
        run: make test-cover COVERAGE_MIN=${COVERAGE_MIN}

      - name: Build
        run: |
          go build ./cmd/rag-mcp
          go build ./cmd/rag-index
          go build ./cmd/rag-install

      - name: Bootstrap config smoke test
        run: |
          rm -f .env opencode.json opencode.json.invalid
          go run ./cmd/rag-install --repo-root .
          test -f .env
          test -f opencode.json

      - name: Run tests in Docker build stage
        run: docker build -f docker/Dockerfile --target test -t rag-search-mcp-test .

      - name: Validate Docker Compose
        run: docker compose --project-directory . -f docker/docker-compose.yml config
