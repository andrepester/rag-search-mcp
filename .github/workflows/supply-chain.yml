name: supply-chain

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "31 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  container-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify container supply-chain policy
        run: sh ./shell/ci-container-supply-chain-policy.sh

      - name: Verify container policy red/green smoke
        run: sh ./shell/ci-container-supply-chain-policy-smoke.sh

  sbom-and-licenses:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate Go SBOM (CycloneDX)
        run: sh ./shell/ci-sbom-go.sh

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-go-cyclonedx
          path: sbom-go.cdx.json

      - name: Export dependency licenses
        run: sh ./shell/ci-licenses-export.sh

      - name: Enforce license allowlist
        run: |
          set -euo pipefail
          disallowed=0
          while IFS=, read -r module license_url license_id; do
            if [ -z "${module}" ]; then
              continue
            fi
            case "${license_id}" in
              MIT|BSD-2-Clause|BSD-3-Clause|Apache-2.0|ISC|MPL-2.0)
                ;;
              *)
                echo "Disallowed or unknown license: ${module} (${license_id})"
                disallowed=1
                ;;
            esac
          done < licenses.csv

          if [ "${disallowed}" -ne 0 ]; then
            echo "License policy check failed"
            exit 1
          fi

      - name: Upload license report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-licenses-report
          path: licenses.csv

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Anchore scan tools
        run: sh ./shell/install-anchore-tools.sh

      - name: Build runtime image
        run: docker build -f docker/Dockerfile -t rag-search-mcp-scan:ci .

      - name: Generate filesystem SBOM (Syft)
        run: syft dir:. --exclude ./tools -o cyclonedx-json=sbom-fs.cdx.json

      - name: Upload filesystem SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-fs-cyclonedx
          path: sbom-fs.cdx.json

      - name: Grype filesystem scan (SARIF)
        run: grype sbom:sbom-fs.cdx.json --fail-on high -o sarif > grype-fs.sarif

      - name: Upload filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: grype-fs.sarif

      - name: Generate image SBOM (Syft)
        run: syft rag-search-mcp-scan:ci -o cyclonedx-json=sbom-image.cdx.json

      - name: Upload image SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-image-cyclonedx
          path: sbom-image.cdx.json

      - name: Grype image scan
        run: grype sbom:sbom-image.cdx.json --fail-on high -o table
